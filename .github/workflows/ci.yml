name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Runtime deps needed by the tests (anthropic / websocket-client are
          # optional, lazily imported, and not exercised in the test suite).
          pip install PyYAML requests pytest

      - name: Compile all packages
        run: python -m compileall -q app agents capital risk execution backtesting data

      - name: Run tests
        run: python -m pytest -q
